<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Nurten Sağlık Merkezi</title>
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/JW7nK9RK/nurten-ikon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="İlaç Paneli">

    <link rel="stylesheet" href="style.css?v=final">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <meta name="theme-color" content="#F4F5F8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0B0B0E" media="(prefers-color-scheme: dark)">
</head>
<body>

    <div class="sticky-top-wrapper">
        <div class="header-compact" id="dynamicHeaderBg" ontouchstart="">
            <div class="app-title">
                <span class="greeting" id="greetingText"></span> 
                <span class="name-tag">Nurten Hanım 🌼</span>
            </div>
            <div class="header-sub" id="update-text">Güncellemek İçin Aşağı Kaydırın</div>
            <div class="header-info">
                <div id="clock" class="clock-text">--:--</div>
                <div id="connection-status"></div>
            </div>
        </div>
    </div>

    <div class="vertical-list">
        
        <section id="tab-today" class="tab-content active">
            <div class="premium-card ios-weather-card" id="weatherCard">
                <div class="ios-w-top">
                    <div class="ios-w-city">📍 Avrupark Hayat</div>
                    <div class="ios-w-right-group">
                        <div class="ios-w-temp" id="wTempText">--°</div>
                        <div class="ios-w-icon" id="wMainIcon"></div>
                        <div class="ios-w-hum" id="wHumText">%-- Nem</div>
                    </div>
                </div>
                <div class="ios-w-divider"></div>
                <div class="ios-w-advice">
                    <div class="ios-w-adv-icon" id="wAdvIcon"></div>
                    <div class="ios-w-adv-text" id="wAdvice">Hava durumu analiz ediliyor...</div>
                </div>
            </div>

            <div id="alertsArea"></div>
            <div id="timelineArea"></div>
        </section>

        <section id="tab-analysis" class="tab-content">
            <div id="healthDiaryArea"></div>
            <div class="premium-card chart-container-wrapper card collapsed" id="chartCard">
                <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')" style="cursor:pointer;">
                    <div class="drug-name">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                        Haftalık Sağlık Trendi
                    </div>
                    <div class="badge badge-wait">ANALİZ <span class="exp-arrow">▲</span></div>
                </div>
                <div class="meds-container">
                    <div class="chart-area" style="height: 240px; margin-top: 10px;">
                        <canvas id="healthChart"></canvas>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 24px; margin-top: 15px; border-top: 1px solid var(--line); padding-top: 12px; padding-bottom: 5px;">
                        <div style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text);">
                            <span style="width: 10px; height: 10px; border-radius: 50%; background-color: #F43F5E;"></span> Ağrı
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text);">
                            <span style="width: 10px; height: 10px; border-radius: 50%; background-color: #3B82F6;"></span> Uyku
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-archive" class="tab-content">
            <div id="statsArea">
                <div class="premium-card card collapsed stat-card" id="card-stat-this-month" onclick="this.classList.toggle('collapsed'); markStatAsRead('buAy', 'card-stat-this-month')">
                    <div class="card-header">
                        <div class="drug-name">
                            <svg class="card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                            <span id="title-buAy">Bu Ayki Özet</span>
                        </div>
                        <div class="badge badge-wait" id="thisMonthBadge">%-- <span class="exp-arrow">▲</span></div>
                    </div>
                    <div class="meds-container stat-details" id="thisMonthDetails">
                        <div class="stat-row"><span class="stat-info">Hesaplanıyor...</span></div>
                    </div>
                </div>

                <div class="premium-card card collapsed stat-card" id="card-stat-last-month" onclick="this.classList.toggle('collapsed'); markStatAsRead('gecenAy', 'card-stat-last-month')">
                    <div class="card-header">
                        <div class="drug-name">
                            <svg class="card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 22v-6h6"/></svg>
                            <span id="title-gecenAy">Geçen Ayın Özeti</span>
                        </div>
                        <div class="badge badge-wait" id="lastMonthBadge">%-- <span class="exp-arrow">▲</span></div>
                    </div>
                    <div class="meds-container stat-details" id="lastMonthDetails">
                        <div class="stat-row"><span class="stat-info">Hesaplanıyor...</span></div>
                    </div>
                </div>

                <div class="premium-card card collapsed stat-card" id="card-stat-yearly" onclick="this.classList.toggle('collapsed'); markStatAsRead('yillik', 'card-stat-yearly')">
                    <div class="card-header">
                        <div class="drug-name">
                            <svg class="card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                            <span id="title-yillik">Yıllık Karne (<span id="currentYearText"></span>)</span>
                        </div>
                        <div class="badge badge-wait" id="yearlyBadge">%-- <span class="exp-arrow">▲</span></div>
                    </div>
                    <div class="meds-container stat-details" id="yearlyDetails">
                        <div class="stat-row"><span class="stat-info">Hesaplanıyor...</span></div>
                    </div>
                </div>
                
                <button onclick="doktorRaporuOlustur()" class="rapor-btn" style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Doktor Raporu (PDF Çıktısı Al)
                </button>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-today', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 3px;">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                <path d="M3.22 12H9.5l2-3 2 6 2-3h5.28"/>
            </svg>
            <span>Günüm</span> </button>
        <button class="nav-item" onclick="switchTab('tab-analysis', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <span>Analiz</span>
        </button>
        <button class="nav-item" onclick="switchTab('tab-archive', this)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Arşiv</span>
        </button>
    </nav>

    <div id="print-report-area"></div>

    <script src="app.js?v=final"></script>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            const target = document.getElementById(tabId);
            if(target) target.classList.add('active');
            btn.classList.add('active');
            
            if(tabId === 'tab-today') {
                if(typeof ekraniCiz === 'function') ekraniCiz();
            } 
            else if(tabId === 'tab-analysis') {
                if(typeof renderHealthDiary === 'function') renderHealthDiary();
                if(typeof grafikCiz === 'function') setTimeout(grafikCiz, 100);
            } 
            else if(tabId === 'tab-archive') {
                if(typeof istatistikleriCiz === 'function') istatistikleriCiz();
            }
        }

        // --- İPHONE HAFIZASINDAKİ ESKİ SW.JS'Yİ ZORLA ÖLDÜREN KOD ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister().then(function(boolean) {
                        console.log("Eski Service Worker başarıyla yok edildi!");
                    });
                }
            });
        }
    </script>
</body>
</html>
