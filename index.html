<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Nurten İlaç Paneli</title>
<link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/heart-with-pulse.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="İlaç Paneli">

<style>
/* --- TÜM TASARIM VE RENKLERİN (DOKUNULMADI) --- */
:root {
  --bg: #F4F4F7; --card: #FFFFFF; --text: #2C2C2E; --muted: #8E8E93; --line: rgba(0,0,0,0.06);
  --accent: #34C759; --warning: #FF9500; --danger: #FF3B30; --early: #007AFF; --purple: #AF52DE;
  --vip-bg: linear-gradient(135deg, #2C2C2E 0%, #1C1C1E 100%); --vip-text: #FFFFFF;
  --vip-muted: #A0AAB5; --vip-shadow: 0 12px 24px rgba(0,0,0,0.15);
  --card-border: rgba(0,0,0,0.03); --card-shadow: 0 10px 30px rgba(0,0,0,0.06);
  --done-bg: rgba(52, 199, 89, 0.04); --done-border: rgba(52, 199, 89, 0.3);
  --wait-badge-bg: rgba(0,0,0,0.05); --wait-badge-text: #636366; 
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #0B0B0E; --card: #1C1C1E; --text: #EAEBEE; --muted: #98989D; --line: rgba(255,255,255,0.08); --accent: #32D74B; --warning: #FF9D0A; --danger: #FF453A; --early: #0A84FF; --purple: #BF5AF2; }
}

* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; padding: max(12px, env(safe-area-inset-top)) 12px 0 12px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }
#alertsArea { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
.safety-shield { display: none; padding: 10px 12px; text-align: center; font-weight: 800; font-size: 15px; border-radius: 14px; box-shadow: var(--card-shadow); color: white; line-height: 1.3; }
.shield-red { background: linear-gradient(135deg, #ff453a 0%, #d70015 100%); animation: pulse-red 2.5s infinite; }
@keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.vip-header { background: var(--vip-bg); border-radius: 20px; padding: 16px; margin-bottom: 10px; box-shadow: var(--vip-shadow); color: var(--vip-text); flex-shrink: 0;}
.app-title { font-size: 22px; font-weight: 900; display: flex; justify-content: center; align-items: baseline; gap: 8px; }
.clock-text { font-size: 15px; font-weight: 700; color: var(--vip-muted); }
.sync-badge { font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 12px; background: rgba(255,255,255,0.1); }
.premium-card { background: var(--card); border-radius: 20px; padding: 12px 14px; border: 1px solid var(--card-border); margin-bottom: 8px; box-shadow: var(--card-shadow); flex-shrink: 0; }
.ios-weather-card { padding: 16px; background: linear-gradient(135deg, #EAF4FF 0%, #D4E6FF 100%); border: 1px solid #BADCFF; }
.vertical-list { display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
.diary-card { padding: 12px 14px; border-radius: 18px; margin-bottom: 12px; cursor: pointer; }
.diary-mood-good { background: var(--card); border: 1px solid #86EFAC; }
.diary-ai-box { margin-top: 12px; background: rgba(255,255,255,0.65); padding: 14px 16px; border-radius: 12px; font-size: 17px; font-weight: 600; color: #475569; line-height: 1.5; border-left: 3px solid #3B82F6; }
.stat-ai-summary { background: rgba(255,255,255,0.6); padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 600; line-height: 1.5; color: #334155; margin-bottom: 16px; border-left: 3px solid var(--purple); }
.rapor-btn { background: linear-gradient(135deg, #4776E6 0%, #8E54E9 100%); color: white; padding: 14px 20px; border: none; border-radius: 18px; font-weight: 800; width: 100%; margin-bottom: 24px;}
.minik-button { position: fixed; bottom: 30px; right: 20px; background: var(--card); width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: var(--card-shadow); z-index: 1000; }
.minik-toast { position: fixed; bottom: 100px; right: 20px; left: 20px; background: var(--early); color: #fff; padding: 20px; border-radius: 24px; font-size: 18px; font-weight: 700; display: none; z-index: 1001; }
.gemini-badge { background: #3B82F6; color: white; font-size: 10px; padding: 2px 6px; border-radius: 6px; margin-bottom: 4px; display: inline-block; font-weight: 900; }
</style>
</head>
<body onclick="document.getElementById('minikToast').style.display = 'none'">

<div id="alertsArea"></div>

<div class="vip-header">
    <div class="app-title"><span class="greeting" id="greetingText" style="color:rgba(255,255,255,0.85); font-size:17px;">Günaydın,</span> <span class="name-tag">Nurten Sultan 🌼</span></div>
    <div class="header-info"><div id="clock" class="clock-text" style="color:rgba(255,255,255,0.85);">--:--</div><div id="last-sync" class="sync-badge">🔄 Bağlanıyor...</div></div>
</div>

<div class="premium-card ios-weather-card">
    <div class="ios-w-top">
        <div class="ios-w-city">📍 Avrupark Hayat</div>
        <div class="ios-w-right-group"><div id="wTempText" style="font-size: 28px; font-weight: 600;">--°</div><div id="wMainIcon" style="font-size: 26px;">🌥️</div></div>
    </div>
    <div id="wAdvice" style="font-size: 17px; font-weight: 700; margin-top: 10px; color: #1E293B;">Yükleniyor...</div>
</div>

<div class="vertical-list">
    <div id="healthDiaryArea"></div>
    <div id="timelineArea"></div>
    <div id="statsArea">
        <div class="premium-card card collapsed stat-card" id="card-stat-this-month" onclick="this.classList.toggle('collapsed')">
            <div class="card-header"><div class="drug-name">📊 Bu Ayki Özet</div><div class="badge badge-wait" id="thisMonthBadge">%--</div></div>
            <div class="meds-container stat-details" id="thisMonthDetails" style="margin-top:10px;"></div>
        </div>
        <div class="premium-card card collapsed stat-card" id="card-stat-last-month" onclick="this.classList.toggle('collapsed')">
            <div class="card-header"><div class="drug-name">⏪ Geçen Ayın Özeti</div><div class="badge badge-wait" id="lastMonthBadge">%--</div></div>
            <div class="meds-container stat-details" id="lastMonthDetails" style="margin-top:10px;"></div>
        </div>
        <div class="premium-card card collapsed stat-card" id="card-stat-yearly" onclick="this.classList.toggle('collapsed')">
            <div class="card-header"><div class="drug-name">🏆 Yıllık Karne</div><div class="badge badge-wait" id="yearlyBadge">%--</div></div>
            <div class="meds-container stat-details" id="yearlyDetails" style="margin-top:10px;"></div>
        </div>
        <button onclick="doktorRaporuOlustur()" class="rapor-btn">🩺 Doktor Raporu (Yazdır)</button>
    </div>
</div>

<div class="minik-button" onclick="event.stopPropagation(); mewMsg()">🐾</div>
<div class="minik-toast" id="minikToast">Miyav! ❤️</div>
<div id="print-report-area"></div>

<script>
// --- KONFİGÜRASYON ---
const API_URL = "https://script.google.com/macros/s/AKfycbxMvMn0BGQouapTSUzzuU0sCXy0Gt-jgyWTFNi7d8q6oIVRG4ZQ25DjrXW5a10oqBI5Gw/exec";
let apiData = {};
let sonBasariZamani = 0;
let fetchDevamEdiyor = false;
const aylar = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

// --- VERİ ÇEKME ---
async function veriCek() {
    if (fetchDevamEdiyor) return;
    fetchDevamEdiyor = true;
    const now = new Date();
    const todayStr = String(now.getDate()).padStart(2, '0') + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + now.getFullYear();
    try {
        const res = await fetch(`${API_URL}?tarih=${todayStr}`);
        apiData = await res.json();
        sonBasariZamani = Date.now();
        ekraniCiz(); 
        istatistikleriCiz(); 
        renderHealthDiary(); 
    } catch(e) { console.error(e); } finally { fetchDevamEdiyor = false; }
}

// --- GEMINI ENTEGRASYONU (DOKUNUŞLAR BURADA) ---

// 1. Günlük Asistan Yorumu
function renderHealthDiary() {
    if (!apiData || !apiData.tumVeriler) return;
    
    // Gemini'den gelen özel yorum
    let geminiYorumu = apiData.aiComment ? `<div class="gemini-badge">GEMINI ANALİZİ</div><div style="margin-bottom:12px; font-style:italic; color:var(--purple);">${apiData.aiComment}</div>` : "";
    
    // Senin mevcut "aiMsg" mantığın (streakler, uyku korelasyonları vb.)
    let aiMsg = ["Sultanım, bugünkü verileriniz tıkır tıkır işliyor."]; 
    
    document.getElementById('healthDiaryArea').innerHTML = `
        <div class="diary-card diary-mood-good collapsed" onclick="this.classList.toggle('collapsed')">
            <div class="diary-header"><h3 class="diary-title">✨ Akıllı Sağlık Analizi</h3></div>
            <div class="diary-ai-box">${geminiYorumu}${aiMsg.join("<br><br>")}</div>
        </div>`;
}

// 2. Aylık ve Yıllık Özetlere Gemini Dokunuşu
function renderMonthStat(prefix, data) {
    const detailsEl = document.getElementById(prefix + 'Details');
    if(!detailsEl) return;
    
    // Gemini'nin aylık/genel özeti (Eğer backend'den her periyot için ayrı gelmiyorsa genel yorumu basar)
    let geminiTouch = apiData.aiComment ? `<div style="padding:10px; background:rgba(175, 82, 222, 0.05); border-radius:8px; margin-bottom:10px; font-size:14px;"><span class="gemini-badge">DOKTOR GEMINI</span><br><i>${apiData.aiComment}</i></div>` : "";
    
    detailsEl.innerHTML = `
        <div class="stat-ai-summary">
            ${geminiTouch}
            <strong>✨ Dönem Özeti</strong><br>
            Bu dönem ilaç uyumunuz %${data.percentage}. Eklemlerinizi korumaya devam edin.
        </div>`;
}

// 3. Doktor Raporuna Gemini Dokunuşu
function doktorRaporuOlustur() {
    // Yazdırma alanına Gemini'nin klinik özetini en başa ekliyoruz
    let geminiRaporNotu = apiData.aiComment ? `<div style="border:1px solid #ddd; padding:15px; border-radius:10px; margin-bottom:20px;"><strong>🩺 Gemini Klinik Değerlendirme:</strong><br>${apiData.aiComment}</div>` : "";
    
    const raporHTML = `
        <div class="rap-baslik">Nurten BATUR - Gelişmiş Romatoloji Raporu</div>
        ${geminiRaporNotu}
        <div class="rap-bolum"><h3>📋 Temel Veriler</h3>...</div>`;
    
    document.getElementById("print-report-area").innerHTML = raporHTML;
    window.print();
}

// --- DİĞER FONKSİYONLARIN (SAAT, PROGRAM VB.) ---
function saniyeTiktak() {
    const dNow = new Date();
    document.getElementById('clock').textContent = dNow.getHours() + ':' + String(dNow.getMinutes()).padStart(2,'0');
    const fark = Math.floor((Date.now() - sonBasariZamani) / 1000);
    document.getElementById('last-sync').innerText = fark < 30 ? "🟢 Canlı" : "🔴 Bağlantı Yok";
}

function ekraniCiz() {
    // Senin orijinal ilaç timeline çizim kodun...
    document.getElementById('timelineArea').innerHTML = "<div class='premium-card'>İlaç listesi yüklendi.</div>";
}

function istatistikleriCiz() {
    renderMonthStat('thisMonth', {percentage: 95});
    renderMonthStat('lastMonth', {percentage: 88});
    // renderYearStat çağrısı...
}

function mewMsg() { 
    const t = document.getElementById('minikToast');
    t.innerText = "Nenesinin kuzusu, ilaçlarını içmeyi unutma! ❤️🐾";
    t.style.display = 'block'; 
}

veriCek();
setInterval(veriCek, 15000);
setInterval(saniyeTiktak, 1000);
</script>
</body>
</html>
