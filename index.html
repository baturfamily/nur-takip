<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Nurten Sağlık Merkezi</title>
<link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/heart-with-pulse.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="İlaç Paneli">

<meta name="theme-color" content="#F4F4F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0B0B0E" media="(prefers-color-scheme: dark)">

<style>
/* GÜNCEL PREMIUM FINANS/SAĞLIK CSS MİMARİSİ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

/* --- AÇIK (LIGHT) MOD RENKLERİ --- */
:root {
  --bg: #F4F5F8; /* Daha temiz, küllü bir arka plan */
  --card: #FFFFFF; 
  --text: #1E293B; /* Slate 800 - Çok daha ciddi ve okunaklı siyah */
  --muted: #64748B; /* Slate 500 */
  --line: rgba(0,0,0,0.04);
  
  /* Finans Merkezi Renk Paleti */
  --accent: #10B981; /* Emerald / Zümrüt Yeşili */
  --warning: #F59E0B; /* Amber */
  --danger: #F43F5E; /* Rose */
  --early: #3B82F6; /* Blue */
  --purple: #8B5CF6; /* Violet */
  
  --vip-bg: linear-gradient(135deg, #1E293B 0%, #0F172A 100%); 
  --vip-text: #FFFFFF; 
  --vip-muted: #94A3B8;
  --vip-gold: #FBBF24; 
  --vip-shadow: 0 12px 24px rgba(0,0,0,0.15); 
  --card-border: rgba(0,0,0,0.04);
  --card-shadow: 0 4px 24px rgba(0,0,0,0.03); /* Soft floating shadow */
  
  --done-bg: rgba(16, 185, 129, 0.04);
  --done-border: rgba(16, 185, 129, 0.2); 
  --wait-badge-bg: #F1F5F9; 
  --wait-badge-text: #64748B;
}

/* --- KARANLIK (DARK) MOD RENKLERİ --- */
@media (prefers-color-scheme: dark) { 
  :root { 
    --bg: #0F1115; /* Finans paneli dark-mode siyahı */
    --card: #1E293B; 
    --text: #F8FAFC; 
    --muted: #94A3B8; 
    --line: rgba(255,255,255,0.06);
    
    --accent: #10B981; 
    --warning: #FBBF24; 
    --danger: #FB7185; 
    --early: #60A5FA; 
    --purple: #A78BFA;
    
    --vip-bg: linear-gradient(135deg, #1E293B 0%, #0F172A 100%); 
    --vip-text: #FFFFFF; 
    --vip-muted: #94A3B8;
    --vip-gold: #FBBF24; 
    --vip-shadow: 0 12px 30px rgba(0,0,0,0.5); 
    --card-border: rgba(255,255,255,0.04);
    --card-shadow: 0 8px 30px rgba(0,0,0,0.2); 
    
    --done-bg: rgba(16, 185, 129, 0.05);
    --done-border: rgba(16, 185, 129, 0.2); 
    --wait-badge-bg: rgba(255,255,255,0.05); 
    --wait-badge-text: #94A3B8;
  }
}

/* NATIVE IOS DENEYİMİ İÇİN UX DOKUNUŞLARI */
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
* { box-sizing: border-box; font-family: 'Inter', -apple-system, system-ui, sans-serif !important; }
body { 
    margin: 0; background: var(--bg); color: var(--text); 
    padding: max(12px, env(safe-area-inset-top)) 16px 0 16px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
    height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; 
    -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s;
    -webkit-user-select: none; user-select: none;
    overscroll-behavior-y: none;
}

#alertsArea { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; flex-shrink: 0; }
.safety-shield { display: none; padding: 12px 14px; text-align: center; font-weight: 800; font-size: 15px; border-radius: 16px; box-shadow: var(--card-shadow); letter-spacing: 0.3px; color: white; line-height: 1.3;}
.shield-red { background: linear-gradient(135deg, #F43F5E 0%, #E11D48 100%); animation: pulse-red 2.5s ease-in-out infinite; }
.shield-yellow { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); animation: pulse-yellow 2.5s ease-in-out infinite; }
.shield-purple { background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%); animation: pulse-purple 2.5s ease-in-out infinite; }
.shield-blue { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); animation: pulse-blue 2.5s ease-in-out infinite; }
@keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } } 
@keyframes pulse-yellow { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } } 
@keyframes pulse-purple { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } } 
@keyframes pulse-blue { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

/* YENİ HEADER EFEKTLERİ */
.sticky-top-wrapper { position: relative; z-index: 100; flex-shrink: 0; margin-bottom: 12px; }
.header-compact { text-align: center; background: var(--vip-bg); padding: 20px 16px; border-radius: 20px; border: 1px solid var(--line); box-shadow:0 8px 24px rgba(0,0,0,0.15); user-select: none; -webkit-tap-highlight-color: transparent; transition: transform 0.15s ease, opacity 0.15s ease; touch-action: manipulation; }
.header-compact:active { transform: scale(0.95) !important; opacity: 0.9 !important; }
.app-title { font-size: 20px; font-weight: 900; letter-spacing: -0.3px; margin-bottom: 8px; color: #fff; display: flex; justify-content: center; align-items: center; gap: 6px; flex-wrap: wrap; }
.app-title .greeting { font-size: 17px; font-weight: 600; opacity: 0.9; }
.app-title .name-tag { font-size: 20px; font-weight: 800; white-space: nowrap; color: #fff; }
.header-sub { font-size: 13px; color: rgba(255, 255, 255, 0.8); font-weight: 600; margin-bottom: 12px; transition: color 0.3s; }
.header-info { display: flex; justify-content: center; align-items: center; gap: 12px; }
.clock-text { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); }
.sync-badge { font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 10px; background: rgba(0,0,0,0.25); color: #fff; display: flex; align-items: center; gap: 6px; }
@keyframes spin-anim { 100% { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin-anim 1s linear infinite; }

/* YENİ VE HEYECAN VERİCİ RAPOR EFEKTLERİ */
@keyframes premium-glow { 
  0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.3); transform: translateY(0); } 
  50% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); transform: translateY(-1px); } 
  100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); transform: translateY(0); } 
}
@keyframes badge-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }

.new-report-pulse { 
  animation: premium-glow 2.5s infinite ease-in-out !important; 
  border: 1px solid var(--purple) !important; 
}
.new-badge { 
  background: var(--purple); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; 
  font-weight: 800; letter-spacing: 0.3px; margin-left: 8px; display: inline-flex; align-items: center; gap: 4px; 
  animation: badge-float 2s infinite ease-in-out; vertical-align: middle; text-transform: uppercase;
}

.premium-card { background: var(--card); border-radius: 20px; padding: 16px; border: 1px solid var(--card-border); margin-bottom: 12px; box-shadow: var(--card-shadow); transition: transform 0.2s ease, box-shadow 0.2s ease; overflow: hidden; flex-shrink: 0; }

/* HAVA DURUMU - Daha solid, monokrom, okunabilir */
.ios-weather-card { padding: 18px; background: var(--card); }
.ios-w-top { display: flex; justify-content: space-between; align-items: center; }
.ios-w-city { font-size: 13px; font-weight: 700; color: var(--muted); margin: 0; display: flex; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; flex-shrink: 0;}
.ios-w-right-group { display: flex; align-items: center; gap: 10px; }
.ios-w-temp { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; margin: 0; color: var(--text); }
.ios-w-icon { font-size: 26px; line-height: 1; margin: 0; }
.ios-w-hum { font-size: 13px; font-weight: 700; background: var(--wait-badge-bg); color: var(--text); padding: 0 12px; border-radius: 10px; margin: 0; display: inline-flex; align-items: center; justify-content: center; height: 28px; }
.ios-w-divider { height: 1px; background: var(--line); margin: 16px 0; }
.ios-w-advice { display: flex; gap: 12px; align-items: flex-start; }
.ios-w-adv-icon { font-size: 22px; margin-top: 2px; }
.ios-w-adv-text { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.5; letter-spacing: -0.2px; display: block; }

/* YENİ PREMIUM ASİSTAN KARTI - Solid arka planlar */
.diary-card { 
    padding: 18px; border-radius: 20px; margin-bottom: 14px; 
    transition: transform 0.2s ease, box-shadow 0.2s ease; flex-shrink: 0; cursor: pointer; 
    overflow: hidden; position: relative;
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: var(--card-shadow);
}

.diary-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.diary-title { font-size: 19px; font-weight: 800; color: var(--purple); margin: 0; letter-spacing: -0.3px; display: flex; align-items: center; gap: 6px; line-height: 1.2; }
.diary-toggle-icon { font-size: 12px; font-weight: 800; color: var(--muted); transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: var(--bg); border-radius: 50%; flex-shrink: 0; }
.diary-card.collapsed .diary-toggle-icon { transform: rotate(180deg); } 

.diary-ai-box { 
    margin-top: 18px; 
    background: var(--bg); /* Bembeyaz kartın içinde tam okunaklı açık gri/koyu mod kutu */
    padding: 18px; border-radius: 14px; 
    font-size: 18px; 
    font-weight: 500; letter-spacing: 0.1px; color: var(--text); line-height: 1.6; 
    border: 1px solid var(--line); 
}
.diary-card.collapsed .diary-ai-box { display: none; }

.stat-card { padding: 16px; margin-bottom: 12px; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; background: var(--card) !important; border: 1px solid var(--line) !important;}
.stat-card .card-header { margin-bottom: 0; }
.stat-card:not(.collapsed) .card-header { margin-bottom: 16px; border-bottom: 1px solid var(--line); padding-bottom: 16px;}
.stat-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 0; border-bottom: 1px dashed var(--line); gap: 12px; } .stat-row:last-child { border-bottom: none; }
.stat-date { font-weight: 800; color: var(--text); min-width: 80px; font-size: 17px;}
.stat-info { flex: 1; display: flex; flex-direction: column; gap: 6px;}
.stat-status { font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; font-size: 16px;}
.stat-missed-list { font-size: 15px; color: var(--danger); font-style: normal; font-weight: 600;}

/* BÜYÜTÜLMÜŞ İSTATİSTİK YAPAY ZEKA KUTUSU - OPAK */
.stat-ai-summary { 
    background: var(--bg); padding: 18px; border-radius: 14px; 
    font-size: 18px; 
    font-weight: 500; letter-spacing: 0.1px; line-height: 1.6; color: var(--text); margin-bottom: 16px; border-left: 4px solid var(--purple); 
}
.stat-ai-summary strong { color: var(--purple); font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 10px; }


.vertical-list { display: flex; flex-direction: column; gap: 14px; flex: 1; overflow-y: auto; padding-bottom: max(120px, env(safe-area-inset-bottom)); -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; } .vertical-list::-webkit-scrollbar { display: none; }
.card { display: flex; flex-direction: column; padding: 16px; margin-bottom: 12px; flex-shrink: 0; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;} 
.card.done-card { border-color: var(--done-border); background: var(--done-bg); box-shadow: none; }
.card-header { display: flex; flex-direction: row; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 16px; width: 100%; padding: 4px 0; }
.drug-name { font-size: 19px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin: 0; white-space: nowrap; color: var(--text); letter-spacing: -0.3px;}
.badge { padding: 6px 10px; border-radius: 8px; font-weight: 800; font-size: 11px; text-transform: uppercase; margin: 0 4px 0 0; white-space: nowrap; display: flex; align-items: center; gap: 4px; letter-spacing: 0.3px;}
.badge-safe { background: rgba(16, 185, 129, 0.1); color: var(--accent); } .badge-wait { background: var(--wait-badge-bg); color: var(--wait-badge-text); } .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); } 
.exp-arrow { transition: transform 0.3s ease; display: inline-block; font-size: 10px; } .card.collapsed .exp-arrow { transform: rotate(180deg); } 
.check-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--muted); flex-shrink: 0; transition: 0.2s; background: var(--card); }
.check-icon.done { background-color: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3); }
.check-icon svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
.meds-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 0; transition: opacity 0.3s; }
.history-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px dashed var(--line); gap: 14px;} .history-item:last-child { border-bottom: none; }
.history-item.is-done .drug-title { text-decoration: line-through; color: var(--muted); }
.history-item.is-done .drug-purpose { color: var(--muted); opacity: 0.6; }

.med-info { display: flex; flex-direction: column; justify-content: center; gap: 6px; flex: 1; min-width: 0; }
.drug-title { font-size: 20px; font-weight: 800; color: var(--text); white-space: normal; line-height: 1.2; transition: all 0.3s ease; } 
.drug-purpose { font-size: 18px; color: var(--muted); font-weight: 500; line-height: 1.45; margin-top: 2px; display: block; transition: all 0.3s ease; }

.card.collapsed .meds-container { display: none; } .card.collapsed .card-header { margin-bottom: 0; }
.badge-danger { background: rgba(244, 63, 94, 0.1); color: var(--danger); font-weight: 800; } .late-card { border-color: var(--danger) !important; animation: latePulse 2s infinite; }
@keyframes latePulse { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }

.rapor-btn { background: var(--text); color: var(--bg); padding: 16px 20px; border: none; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 8px; margin-bottom: 24px; width: 100%; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); flex-shrink:0; transition: transform 0.2s ease;}
.rapor-btn:active { transform: scale(0.96); }
#print-report-area { display: none; }

/* DOKTOR RAPORU YAZDIRMA CSS'İ */
@media print {
  @page { margin: 10mm; } 
  html, body { position: static !important; overflow: visible !important; height: auto !important; width: auto !important; display: block !important; background: white !important; padding: 0 !important; margin: 0 !important; }
  body > :not(#print-report-area) { display: none !important; }
  #print-report-area { display: block !important; position: relative !important; width: 100% !important; padding: 10px !important; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif !important; color: #000 !important; font-size: 12px !important; }
  .rap-baslik { font-size: 20px; font-weight: bold; text-align: center; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 16px; color: #111; }
  .rap-bolum { margin-bottom: 16px; } 
  .rap-bolum h3 { font-size: 15px; border-bottom: 2px solid #ccc; padding-bottom: 4px; margin-bottom: 8px; color: #222; }
  .rap-bolum-ilac { margin-bottom: 8px; page-break-after: avoid; } 
  .rap-bolum-tablo { margin-top: 0; }
  .rap-tablo { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; } 
  .rap-tablo th, .rap-tablo td { border: 1px solid #000; padding: 5px; text-align: center; }
  .rap-tablo th { background-color: #eaeaea; font-weight: bold; font-size: 11px; } 
  .rap-alert { color: red; font-weight: bold; }
  .ai-rapor-kutu { background-color: #f8f9fa; border-left: 4px solid #007aff; padding: 10px; margin-top: 8px; font-size: 12px; line-height: 1.5; border-radius: 4px; text-align: left !important; }
  .ai-rapor-kutu * { text-align: left !important; }
  center { text-align: left !important; display: block; }
}
</style>
</head>
<body>

<div id="alertsArea"></div>

<div class="sticky-top-wrapper">
    <div class="header-compact" id="dynamicHeaderBg" ontouchstart="">
        <div class="app-title">
            <span class="greeting" id="greetingText" style="display: flex; align-items: center;"></span> 
            <span class="name-tag">Nurten Hanım 🌼</span>
            <span id="sync-icon" style="display:inline-flex; align-items:center; margin-left: 4px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </span>
        </div>
        <div class="header-sub" id="update-text">Güncellemek İçin Aşağı Kaydırın</div>
        <div class="header-info">
            <div id="clock" class="clock-text">--:--</div>
            <div id="last-sync" class="sync-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                Bağlanıyor...
            </div>
        </div>
    </div>
</div>

<div class="vertical-list">
    
    <div class="premium-card ios-weather-card">
        <div class="ios-w-top">
            <div class="ios-w-city">📍 Avrupark Hayat</div>
            <div class="ios-w-right-group">
                <div class="ios-w-temp" id="wTempText">--°</div>
                <div class="ios-w-icon" id="wMainIcon">🌥️</div>
                <div class="ios-w-hum" id="wHumText">%-- Nem</div>
            </div>
        </div>
        <div class="ios-w-divider"></div>
        <div class="ios-w-advice">
            <div class="ios-w-adv-icon" id="wAdvIcon">🩺</div>
            <div class="ios-w-adv-text" id="wAdvice">Hastalık teşhis motoru yükleniyor...</div>
        </div>
    </div>

    <div id="healthDiaryArea"></div>
    <div id="timelineArea"></div>

    <div id="statsArea">
        <div class="premium-card card collapsed stat-card" id="card-stat-this-month" onclick="this.classList.toggle('collapsed'); markStatAsRead('buAy', 'card-stat-this-month')">
            <div class="card-header">
                <div class="drug-name">
                    <svg class="card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    <span id="title-buAy">Bu Ayki Özet</span>
                </div>
                <div class="badge badge-wait" id="thisMonthBadge">%-- <span class="exp-arrow">▲</span></div>
            </div>

        <div class="premium-card card collapsed stat-card" id="card-stat-last-month" onclick="this.classList.toggle('collapsed'); markStatAsRead('gecenAy', 'card-stat-last-month')">
            <div class="card-header">
                <div class="drug-name">
                    <svg class="card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 22v-6h6"/></svg>
                    <span id="title-gecenAy">Geçen Ayın Özeti</span>
                </div>
                <div class="badge badge-wait" id="lastMonthBadge">%-- <span class="exp-arrow">▲</span></div>
            </div>
            <div class="meds-container stat-details" id="lastMonthDetails">
                <div class="stat-row"><span class="stat-info">Hesaplanıyor...</span></div>
            </div>
        </div>

        <div class="premium-card card collapsed stat-card" id="card-stat-yearly" onclick="this.classList.toggle('collapsed'); markStatAsRead('yillik', 'card-stat-yearly')">
            <div class="card-header">
                <div class="drug-name">
                    <svg class="card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                    <span id="title-yillik">Yıllık Karne (<span id="currentYearText"></span>)</span>
                </div>
                <div class="badge badge-wait" id="yearlyBadge">%-- <span class="exp-arrow">▲</span></div>
            </div>
            <div class="meds-container stat-details" id="yearlyDetails">
                <div class="stat-row"><span class="stat-info">Hesaplanıyor...</span></div>

async function fetchWeather() {
    try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.07&longitude=28.64&current=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=uv_index_max&timezone=auto');
        const data = await res.json();
        const t = Math.round(data.current.temperature_2m); 
        const h = data.current.relative_humidity_2m;
        const w = data.current.wind_speed_10m;
        const uv = data.daily.uv_index_max[0]; 

        // GÜNDÜZ/GECE KONTROLÜ (Mevcut saati alıyoruz)
        const currentHour = new Date().getHours();
        const isDaytime = (currentHour >= 7 && currentHour < 19); // 07:00 - 19:00 arası gündüz kabul edilir

        let icon = "🌥️", advIcon = "🩺", advColor = "var(--accent)", adviceList = [];
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

        // UV UYARISI SADECE GÜNDÜZ ÇALIŞACAK ŞEKİLDE GÜNCELLENDİ
        if (isDaytime && uv > 5) { advIcon = "🕶️"; advColor = "var(--warning)"; adviceList = ["Güneş (UV) bugün çok dik geliyor. İlaçların cildini hassas yapabilir, lütfen koruyucu sür ve gölgede kal."]; } 
        else if (w > 20) { icon = "🌬️"; advIcon = "💧"; advColor = "var(--early)"; adviceList = ["Dışarıda esintili bir hava var. En ufak rüzgar bile Sjögren'li gözleri anında kurutur, damlanı almadan çıkma."]; } 
        else if (h > 70 && t < 15) { icon = "🌧️"; advIcon = "⚠️"; advColor = "var(--danger)"; adviceList = [`Hava soğuk ve nemli (%${h}). Nem eklem sıvılarının basıncını değiştirip ağrı yapabilir. Lütfen dizlerini sıcak tut.`]; } 
        else if (t < 12) { icon = "🥶"; advIcon = "🧣"; advColor = "var(--warning)"; adviceList = ["Dışarısı oldukça soğuk. Soğuk hava eklemleri sertleştirir, lütfen kat kat giyinmeyi ihmal etme."]; } 
        else if (t > 28) { icon = "☀️"; advIcon = "🥤"; advColor = "var(--warning)"; adviceList = ["Hava oldukça sıcak. Sıval kaybı ağız ve göz kuruluğunu artırır. Bol bol su içmeyi unutma."]; } 
        // GECE İÇİN ÖZEL BİR DEFAULT MESAJ EKLENEBİLİR
        else if (!isDaytime) {
            adviceList = [`Hava dışarıda ${t}°C. İlaçlarını alıp dinlenme vakti, iyi geceler.`]; 
            let tempColor = "var(--text)"; if (t < 20) tempColor = "#34C759"; else if (t < 28) tempColor = "#FF9500"; document.getElementById('wTempText').style.color = tempColor;
            icon = "🌙"; // Gece ikonu
        }
        else { 
            adviceList = [`Hava bugün senin için gayet güzel (${t}°C). Keyfini çıkar!`]; 
            let tempColor = "var(--text)"; if (t < 20) tempColor = "#34C759"; else if (t < 28) tempColor = "#FF9500"; document.getElementById('wTempText').style.color = tempColor; 
        }

        let humColor = "var(--text)";
        if (h < 40) humColor = "#FF9500"; else if (h <= 60) humColor = "#34C759"; else if (h <= 75) humColor = "#32ADE6"; else humColor = "#AF52DE";
        
        document.getElementById('wMainIcon').innerText = icon;
        document.getElementById('wTempText').innerText = t + "°";
        document.getElementById('wHumText').innerText = "%" + h + " Nem";
        document.getElementById('wHumText').style.color = humColor;
        document.getElementById('wAdvIcon').innerText = advIcon;
        document.getElementById('wAdvIcon').style.color = advColor; 
        document.getElementById('wAdvice').innerText = pick(adviceList);
    } catch(e) { console.error("Hava durumu çekilemedi:", e); }
}

function saniyeTiktak() {
    const syncElement = document.getElementById('last-sync');
    const clockElement = document.getElementById('clock');
    const simdi = Date.now();
    const dNow = new Date();
    
    clockElement.textContent = dNow.getDate() + " " + dNow.toLocaleDateString('tr-TR', {month:'short'}) + " • " + String(dNow.getHours()).padStart(2,'0') + ':' + String(dNow.getMinutes()).padStart(2,'0');
    
    if(fetchDevamEdiyor) return;

    const farkSaniye = sonBasariZamani > 0 ? Math.floor((simdi - sonBasariZamani) / 1000) : 999;
    
    if (sonBasariZamani === 0) { syncElement.innerHTML = `${svgSync} Bağlanıyor...`; syncElement.style.color = "var(--vip-gold)"; } 
    else if (farkSaniye < 20) { const d = new Date(sonBasariZamani); syncElement.innerHTML = `🟢 Canlı (${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')})`; syncElement.style.color = "#4ADE80"; } 
    else if (farkSaniye < 60) { syncElement.innerHTML = `🟡 Gecikme: ${farkSaniye} sn`; syncElement.style.color = "var(--vip-gold)"; } 
    else { syncElement.innerHTML = `🔴 Bağlantı Yok`; syncElement.style.color = "#FF453A"; }
}

function analyzeMonth(year, month) {
    let totalMeds = 0; let missedMedsCount = 0; let breakdown = [];
    const dNow = new Date();
    const isCurrentMonth = (year === dNow.getFullYear() && month === dNow.getMonth());
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const maxDay = isCurrentMonth ? dNow.getDate() : daysInMonth;
    const START_DATE = new Date(2026, 2, 7);
    
    for (let d = maxDay; d >= 1; d--) { 
        let currentDay = new Date(year, month, d);
        if (currentDay < START_DATE) continue; 
        let dateStr = String(d).padStart(2, '0') + '.' + String(month + 1).padStart(2, '0') + '.' + year;
        let prog = getDailyProgram(currentDay);
        let dayTotal = 0; let dayMissedCount = 0; let dayMissedNames = [];
        let dayData = (apiData.tumVeriler && apiData.tumVeriler[dateStr]) ? apiData.tumVeriler[dateStr] : null;
        
        prog.forEach(s => {
            let cardMins = s.time ? (parseInt(s.time.split(':')[0]) * 60) + parseInt(s.time.split(':')[1]) : 0;
            s.meds.forEach(m => {
                dayTotal++;
                let isDone = dayData ? (dayData[m.key] === "İçildi") : false;
                let isExplicitlyMissed = dayData ? (dayData[m.key] === "İçilmedi") : false;
                let isMissed = false;
                if (!isDone) {
                    if (isExplicitlyMissed) { isMissed = true; } 
                    else if (isCurrentMonth && d === dNow.getDate()) {
                        const nowMins = (dNow.getHours() * 60) + dNow.getMinutes();
                        if (nowMins > cardMins + 90) isMissed = true;
                    } else { isMissed = true; }
                }
                if (isMissed) { dayMissedCount++; dayMissedNames.push(m.name); }
            });
        });
        totalMeds += dayTotal; missedMedsCount += dayMissedCount;
        if (dayTotal > 0) breakdown.push({ dateStr: dateStr, dayNum: d, totalCount: dayTotal, missedCount: dayMissedCount, missedNames: dayMissedNames, isAllDone: (dayMissedCount === 0) });
    }
    let percentage = totalMeds > 0 ? Math.round(((totalMeds - missedMedsCount) / totalMeds) * 100) : 100;
    return { percentage, breakdown };
}

function getBadgeClass(percentage) { return percentage >= 90 ? "badge-safe" : percentage >= 70 ? "badge-warning" : "badge-danger"; }

function ekraniCiz() {
    const dNow = new Date(); 
    const todayProg = getDailyProgram(dNow);
    
    let alertsHTML = "";
    todayProg.forEach(s => {
        if(!s.meds) return;
        s.meds.forEach(m => {
            if(m.key === 'SABAH_TOK_DELTA') alertsHTML += `<div class="safety-shield shield-red" style="display:block;">🚨 Bugün Deltacortril Günü</div>`;
            if(m.key === 'SABAH_TOK_COLEDAN' && !alertsHTML.includes('Vitamin')) alertsHTML += `<div class="safety-shield shield-yellow" style="display:block;">☀️ Bugün Vitamin ve Folbiol Günü</div>`;
            if(m.key === 'GECE_METOARTCON') alertsHTML += `<div class="safety-shield shield-blue" style="display:block;">🧬 Bugün Metoartcon İğne Günü</div>`;
            if(m.key === 'GECE_CIMZIA') alertsHTML += `<div class="safety-shield shield-purple" style="display:block;">💉 Bugün Cimzia İğne Günü! Şifa olsun.</div>`;
        });
    });
    const alertsEl = document.getElementById('alertsArea'); if(alertsEl) alertsEl.innerHTML = alertsHTML;

    let timelineHTML = "";
    todayProg.forEach((s) => {
        let sTC = 0; let medsHTML = "";
        s.meds.forEach(m => { 
            const isDone = (apiData && apiData.tumVeriler && apiData.tumVeriler[String(dNow.getDate()).padStart(2, '0') + '.' + String(dNow.getMonth() + 1).padStart(2, '0') + '.' + dNow.getFullYear()] && apiData.tumVeriler[String(dNow.getDate()).padStart(2, '0') + '.' + String(dNow.getMonth() + 1).padStart(2, '0') + '.' + dNow.getFullYear()][m.key] === "İçildi");
            if(isDone) sTC++; 
            const iconHTML = isDone ? `<div class="check-icon done">${svgCheck}</div>` : `<div class="check-icon"></div>`;
            
            const doneClass = isDone ? "is-done" : "";
            medsHTML += `<div class="history-item ${doneClass}">${iconHTML}<div class="med-info"><span class="drug-title">${m.name}</span><span class="drug-purpose">${m.purpose}</span></div></div>`; 
        });
        
        const isAllDone = (sTC === s.meds.length);
        let isLate = false;
        if (!isAllDone && s.time) {
            const cardMins = (parseInt(s.time.split(':')[0], 10) * 60) + parseInt(s.time.split(':')[1], 10);
            const nowMins = (dNow.getHours() * 60) + dNow.getMinutes();
            if (nowMins > cardMins + 90) isLate = true;
        }

        let badgeClass = "badge-wait"; let badgeText = "BEKLİYOR"; let cardClass = "";
        if (isAllDone) { badgeClass = "badge-safe"; badgeText = `TAMAMLANDI <span class="exp-arrow">▲</span>`; cardClass = "done-card"; } 
        else if (isLate) { badgeClass = "badge-danger"; badgeText = "🚨 İÇİLMEYEN İLAÇ VAR"; cardClass = "late-card"; }
        
        const collapseClass = isAllDone ? "collapsed" : "";
        timelineHTML += `<div class="premium-card card ${cardClass} ${collapseClass}" onclick="this.classList.toggle('collapsed')"><div class="card-header"><div class="drug-name">${s.icon} ${s.title}</div><div class="badge ${badgeClass}">${badgeText}</div></div><div class="meds-container">${medsHTML}</div></div>`;
    });
    const timelineEl = document.getElementById('timelineArea'); if(timelineEl) timelineEl.innerHTML = timelineHTML;
}

        const simdi = Date.now();
        if (sonBasariZamani === 0 || (simdi - sonBasariZamani > 600000)) {
            veriCek(); 
            fetchWeather(); 
        }
    }
});

let pStartY = 0;
let pCurrentY = 0;
let pIsPulling = false;

document.addEventListener('touchstart', (e) => {
    const vList = document.querySelector('.vertical-list');
    if (vList && vList.scrollTop <= 0) {
        pStartY = e.touches[0].clientY;
        pIsPulling = true;
    }
}, {passive: true});

document.addEventListener('touchmove', (e) => {
    if (!pIsPulling || fetchDevamEdiyor) return;
    pCurrentY = e.touches[0].clientY;
    let diff = pCurrentY - pStartY;
    const uText = document.getElementById('update-text');
    if (diff > 60) {
        if(uText) uText.innerHTML = `Bırakın Güncellensin ${svgSync}`;
    }
}, {passive: true});

document.addEventListener('touchend', (e) => {
    if (!pIsPulling) return;
    pIsPulling = false;
    if (fetchDevamEdiyor) return;
    let diff = pCurrentY - pStartY;
    pCurrentY = 0;
    if (diff > 60) {
        manuelYenile();
    } else {
        const uText = document.getElementById('update-text');
        if(uText) uText.innerHTML = "Güncellemek İçin Aşağı Kaydırın";
    }
});
</script>
