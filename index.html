<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Nurten İlaç Paneli</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="İlaç Paneli">

<style>
/* --- AÇIK (LIGHT) MOD RENKLERİ --- */
:root {
  --bg: #F4F4F7; 
  --card: #FFFFFF; 
  --text: #2C2C2E; 
  --muted: #8E8E93; 
  --line: rgba(0,0,0,0.06);
  --accent: #34C759; 
  --warning: #FF9500; 
  --danger: #FF3B30; 
  --early: #007AFF; 
  --purple: #AF52DE; 
  
  --vip-bg: linear-gradient(135deg, #2C2C2E 0%, #1C1C1E 100%);
  --vip-text: #FFFFFF;
  --vip-muted: #A0AAB5;
  --vip-gold: #F1C40F;
  --vip-shadow: 0 12px 24px rgba(0,0,0,0.15);

  --card-border: rgba(0,0,0,0.03);
  --card-shadow: 0 10px 30px rgba(0,0,0,0.06);

  --done-bg: rgba(52, 199, 89, 0.04);
  --done-border: rgba(52, 199, 89, 0.3);
  --wait-badge-bg: rgba(0,0,0,0.05);
  --wait-badge-text: #636366; 
}

/* --- KARANLIK (DARK) MOD RENKLERİ --- */
@media (prefers-color-scheme: dark) {
  :root { 
    --bg: #0B0B0E; 
    --card: #1C1C1E; 
    --text: #EAEBEE; 
    --muted: #98989D; 
    --line: rgba(255,255,255,0.08);
    --accent: #32D74B; 
    --warning: #FF9D0A; 
    --danger: #FF453A; 
    --early: #0A84FF; 
    --purple: #BF5AF2;
    
    --vip-bg: linear-gradient(135deg, #2C2C2E 0%, #1C1C1E 100%);
    --vip-text: #FFFFFF;
    --vip-muted: #98989D;
    --vip-gold: #F1C40F;
    --vip-shadow: 0 12px 30px rgba(0,0,0,0.5);

    --card-border: rgba(255,255,255,0.05);
    --card-shadow: 0 10px 30px rgba(0,0,0,0.4);

    --done-bg: rgba(50, 215, 75, 0.05);
    --done-border: rgba(50, 215, 75, 0.3);
    --wait-badge-bg: rgba(255,255,255,0.1);
    --wait-badge-text: #D1D1D6; 
  }
}

* { box-sizing: border-box; }
body { 
  margin: 0; 
  background: var(--bg); 
  color: var(--text); 
  font-family: -apple-system, system-ui, sans-serif; 
  padding: max(12px, env(safe-area-inset-top)) 12px 0 12px; 
  height: 100vh; 
  display: flex; 
  flex-direction: column; 
  overflow: hidden; 
  -webkit-font-smoothing: antialiased; 
  transition: background 0.3s, color 0.3s; 
}

/* GÜVENLİK KALKANI */
#alertsArea { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
.safety-shield { display: none; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; border-radius: 16px; box-shadow: var(--card-shadow); letter-spacing: 0.3px; color: white; }
.shield-red { background: linear-gradient(135deg, #ff453a 0%, #d70015 100%); animation: pulse-red 2.5s ease-in-out infinite; }
.shield-yellow { background: linear-gradient(135deg, #ff9d0a 0%, #c35900 100%); animation: pulse-yellow 2.5s ease-in-out infinite; }
.shield-purple { background: linear-gradient(135deg, #bf5af2 0%, #5e5ce6 100%); animation: pulse-purple 2.5s ease-in-out infinite; }
.shield-blue { background: linear-gradient(135deg, #0a84ff 0%, #0040dd 100%); animation: pulse-blue 2.5s ease-in-out infinite; }

@keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes pulse-yellow { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes pulse-purple { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes pulse-blue { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* VIP BAŞLIK KARTI */
.vip-header { background: var(--vip-bg); border-radius: 20px; padding: 12px 16px; margin-bottom: 8px; box-shadow: var(--vip-shadow); color: var(--vip-text); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;}

.app-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; display: flex; justify-content: center; align-items: center; gap: 6px; flex-wrap: wrap; position: relative; z-index: 1;}
.app-title .greeting { font-size: 13px; font-weight: 700; color: var(--vip-muted); }
.app-title .name-tag { white-space: nowrap; color: var(--vip-text); }
.header-info { display: flex; justify-content: center; align-items: center; gap: 8px; position: relative; z-index: 1;}
.clock-text { font-size: 12px; font-weight: 700; color: var(--vip-muted); }
.sync-badge { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 10px; background: rgba(255,255,255,0.1); color: var(--vip-text); backdrop-filter: blur(4px); }

/* TÜM KARTLARIN ORTAK SINIFI */
.premium-card { 
    background: var(--card); 
    border-radius: 20px; 
    padding: 12px 14px; 
    border: 1px solid var(--card-border); 
    margin-bottom: 8px; 
    box-shadow: var(--card-shadow); 
    transition: all 0.3s ease;
    overflow: hidden;
    flex-shrink: 0;
}

/* AYLIK İLAÇ TAMAMLAMA KARTI (Kompakt) */
.compact-stat { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
.stat-left { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase;}
.stat-right { font-size: 19px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }

/* HAVA DURUMU KARTI - TEK SATIR DÜZENİ */
.ios-weather-card { padding: 12px 16px; }
.ios-w-top { display: flex; justify-content: space-between; align-items: center; }
.ios-w-city { font-size: 13px; font-weight: 800; color: var(--muted); margin: 0; display: flex; align-items: center; gap: 4px; text-transform: uppercase;}
.ios-w-right-group { display: flex; align-items: center; gap: 8px; }
.ios-w-temp { font-size: 26px; font-weight: 500; letter-spacing: -1px; color: var(--text); line-height: 1; margin: 0;}
.ios-w-icon { font-size: 22px; line-height: 1; margin: 0; }
.ios-w-hum { font-size: 13px; font-weight: 800; color: var(--early); margin: 0; }

.ios-w-divider { height: 1px; background: var(--line); margin: 10px 0; }
.ios-w-advice { display: flex; gap: 10px; align-items: flex-start; }
.ios-w-adv-icon { font-size: 22px; margin-top: 2px; }
.ios-w-adv-text { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.4; letter-spacing: -0.3px; }

/* TEK SÜTUN İLAÇ LİSTESİ DÜZENİ */
.vertical-list { 
  display: flex; 
  flex-direction: column; 
  gap: 8px; 
  flex: 1; 
  overflow-y: auto; 
  padding-bottom: max(90px, env(safe-area-inset-bottom)); 
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.vertical-list::-webkit-scrollbar {
  display: none;
}

.card { display: flex; flex-direction: column; padding: 12px 14px; margin-bottom: 0; flex-shrink: 0;}
.card.done-card { border-color: var(--done-border); background: var(--done-bg); box-shadow: none; }

/* KART BAŞLIĞI - YAN YANA (YATAY) DÜZEN */
.card-header { 
  display: flex; 
  flex-direction: row; 
  justify-content: space-between; 
  align-items: center; 
  gap: 6px; 
  margin-bottom: 12px; 
  width: 100%; 
}
.drug-name { font-size: 19px; font-weight: 800; display: flex; align-items: center; gap: 6px; margin: 0; white-space: nowrap; color: var(--text); letter-spacing: -0.5px;}

.badge { padding: 4px 8px; border-radius: 8px; font-weight: 800; font-size: 11px; text-transform: uppercase; margin: 0; white-space: nowrap; display: flex; align-items: center; gap: 4px; letter-spacing: 0.3px;}
.badge-safe { background: rgba(52, 199, 89, 0.15); color: var(--accent); }
.badge-wait { background: var(--wait-badge-bg); color: var(--wait-badge-text); }

/* OK ANİMASYONU İÇİN CLASS */
.exp-arrow { transition: transform 0.3s ease; display: inline-block; font-size: 10px; }
.card.collapsed .exp-arrow { transform: rotate(180deg); } 

/* Özel SVG İkonlar */
.check-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--line); flex-shrink: 0; transition: 0.2s; }
.check-icon.done { background-color: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 2px 6px rgba(52, 199, 89, 0.3); }
.check-icon svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }

/* İLAÇ LİSTESİ */
.meds-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 0; transition: opacity 0.3s; }
.history-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--line); gap: 10px; font-size: 13px;}
.history-item:last-child { border-bottom: none; }

.med-info { display: flex; flex-direction: column; justify-content: center; gap: 2px; flex: 1; min-width: 0; }
.drug-title { font-size: 15px; font-weight: 800; color: var(--text); white-space: normal; line-height: 1.2; }
.drug-purpose { font-size: 12px; color: var(--muted); font-weight: 600; font-style: italic; }

/* OTOMATİK DARALMA */
.card.collapsed { cursor: pointer; }
.card.collapsed .meds-container { display: none; }
.card.collapsed .card-header { margin-bottom: 0; }

/* MİNİK BUTONU VE TOAST */
.minik-button { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); right: 20px; background: var(--card); width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: var(--card-shadow); border: 1px solid var(--card-border); z-index: 1000; cursor: pointer; transition: transform 0.2s; }
.minik-button:active { transform: scale(0.9); }
.minik-toast { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); right: 20px; background: var(--early); color: #fff; padding: 16px; border-radius: 20px; font-size: 14px; font-weight: 800; display: none; z-index: 1001; width: 260px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); line-height: 1.4; text-align: left; }
</style>
</head>
<body onclick="document.getElementById('minikToast').style.display = 'none'">

<div id="alertsArea"></div>

<div class="vip-header">
    <div class="app-title">
        <span class="greeting" id="greetingText">Günaydın,</span>

    </div>
</div>

<div class="premium-card compact-stat">
    <div class="stat-left" id="monthTitleText">🗓️ AYLIK İLAÇ TAMAMLAMA ORANI</div>

</div>

<div class="premium-card ios-weather-card">

            <div class="ios-w-temp" id="wTempText">--°</div>

        <div class="ios-w-adv-icon" id="wAdvIcon">🩺</div>

    </div>
</div>

<div class="vertical-list" id="timelineArea">
    </div>

<div class="minik-button" onclick="event.stopPropagation(); mewMsg()">🐾</div>
<div class="minik-toast" id="minikToast">Miyav! ❤️</div>

<script>
// GÜNCEL API URL
const API_URL = "https://script.google.com/macros/s/AKfycbxRiBjuMTcinzd4n8FV7NncHEWLGvQbpE86gL65ZsC87wH71H1L7Cl4YwcU4ip831o5Jw/exec"; 
let sonBasariZamani = 0;
let fetchDevamEdiyor = false;
let apiData = {};

// SVG İkon Tanımları
const svgCheck = `<svg viewBox="0 0 14 10"><polyline points="1.5 5 5 8.5 12.5 1"></polyline></svg>`;

// GREETING VE DİNAMİK AY BAŞLIĞI
const now = new Date();
const hour = now.getHours();
let gMsg = (hour >= 5 && hour < 12) ? "Günaydın" : (hour >= 12 && hour < 17) ? "Tünaydın" : (hour >= 17 && hour < 22) ? "İyi Akşamlar" : "İyi Geceler";
document.getElementById('greetingText').innerText = `${gMsg},`;

const aylar = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
document.getElementById('monthTitleText').innerText = `🗓️ ${aylar[now.getMonth()].toUpperCase()} AYI İLAÇ TAMAMLAMA ORANI`;

// GELİŞMİŞ HAVA DURUMU & TEŞHİS 
async function fetchWeather() {
    try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.07&longitude=28.64&current=temperature_2m,relative_humidity_2m');
        const data = await res.json();
        const t = Math.round(data.current.temperature_2m); 
        const h = data.current.relative_humidity_2m;
        
        let icon = "🌥️";
        let advIcon = "🩺";
        let advColor = "var(--accent)";
        let adv = `Hava bugün senin için gayet güzel (${t}°C). Romatizma ve Sjögren açısından en konforlu ve rahat hissedeceğin denge durumundasın. Keyfini çıkar!`;
        
        // Akıllı Sıcaklık Rengi
        let tempColor = "var(--text)";
        if (t < 10) tempColor = "#007AFF"; 
        else if (t < 20) tempColor = "#34C759"; 
        else if (t < 28) tempColor = "#FF9500"; 
        else tempColor = "#FF3B30"; 

        // Akıllı Nem Rengi
        let humColor = "var(--text)";
        if (h < 40) humColor = "#FF9500"; 
        else if (h <= 60) humColor = "#34C759"; 
        else if (h <= 75) humColor = "#32ADE6"; 
        else humColor = "#AF52DE"; 
        
        if (h > 70 && t < 15) { 
            icon = "🌧️"; advIcon = "⚠️"; advColor = "var(--danger)";
            adv = `Hava soğuk ve nemli (%${h}). Nem ve soğuk birleştiğinde eklem sıvılarının basıncı değişir; bu durum romatizmal ağrıları tetikleyebilir. Lütfen dizlerini sıcak tutmaya ve kendini yormamaya özen göster.`; 
        }
        else if (t < 12) { 
            icon = "🥶"; advIcon = "🧣"; advColor = "var(--warning)";
            adv = `Dışarısı oldukça soğuk (${t}°C). Soğuk hava eklemleri sertleştirdiği ve Sjögren kaynaklı göz kuruluğunu artırdığı için eklemlerini mutlaka sıcak tutmalı, rüzgar varsa damlalarını kullanmalısın.`; 
        }
        else if (h > 75) { 
            icon = "🌫️"; advIcon = "💧"; advColor = "var(--purple)";
            adv = `Nem oranı çok yüksek (%${h}). Yüksek nem eklemlerde ağırlık hissi ve sabah tutukluğunu artırabileceği için bugün fiziksel olarak kendini fazla zorlamamaya dikkat etmelisin.`; 
        }
        else if (t > 28) { 
            icon = "☀️"; advIcon = "🕶️"; advColor = "var(--warning)";
            adv = `Hava oldukça sıcak (${t}°C). Yüksek ısı vücuttaki sıvı kaybını hızlandırıp ağız ve göz kuruluğunu artırır. Bu yüzden bol bol su içmeyi ve göz damlalarını her zamankinden sık kullanmayı unutma.`; 
        }
        
        document.getElementById('wMainIcon').innerText = icon;
        
        const tEl = document.getElementById('wTempText');
        tEl.innerText = `${t}°`; 
        tEl.style.color = tempColor;

        const hEl = document.getElementById('wHumText');
        hEl.innerText = `%${h} Nem`;
        hEl.style.color = humColor;

        document.getElementById('wAdvIcon').innerText = advIcon;
        document.getElementById('wAdvIcon').style.color = advColor; 
        document.getElementById('wAdvice').innerText = adv;
    } catch(e) { }
}
fetchWeather();

// MİNİK İÇİN DİNAMİK "TEK CÜMLE" KOMBİNASYON MOTORU
function mewMsg() {
    const arrA = [
        "Nenesinin kuzusu,", "Güzeller güzeli annem,", "Benim canım nenem,", 
        "Nurten Sultanım,", "Pamuk nenem,", "Canımın içi,", 
        "En sevdiğim insan,", "Tatlı annem,", "Kraliçem,", "Sarı papatyam,"
    ];
    const arrB = [
        "ben Virbac mamamı lıkır lıkır yedim", "az önce Göker'le güzelce oyun oynadık", 
        "Alper abim başımı şefkatle okşadı", "Keppra'mı hiç itiraz etmeden uslu uslu içtim", 
        "kalbimin ilacını (Enalapril) uslu uslu aldım", "camdan kuşları seyrederken seni düşündüm", 
        "patilerimi temizleyip yanına gelmeye hazırlanıyorum", "astımım bugün çok iyi, nefesim pırıl pırıl", 
        "yumuşacık yatağımda gerinirken aklıma sen geldin", "burnumu nemlendirip bıyıklarımı düzelttim"
    ];
    const arrC = [
        "ve şimdi gözüm senin panonun üstünde", "ve sıra senin kendi şifanı almanda", 
        "ve sen de sularını lıkır lıkır içmelisin", "ve ilaçlarını eksiksiz içtiğini biliyorum", 
        "ve biz ailecek birbirimize çok iyi bakıyoruz", "ve senin de damlalarını aksatmadığını görmek istiyorum", 
        "ve eklemlerin ağrımasın diye o sıcak dizlerine kıvrılacağım", "ve romatizman yormasın diye bugün kendini hiç yormamanı istiyorum", 
        "ve Sjögren kurutmasın diye bol su içmeni bekliyorum", "ve birlikte her gün daha da iyi oluyoruz"
    ];
    const arrD = [
        "seni minik kalbimle çok seviyorum! ❤️", "ıslak burnumla yanaklarından öpüyorum! 🐾", 
        "bıyıklarım senin için neşeyle titriyor! 😻", "ben hep senin gölgendeyim! ✨", 
        "akşama yanına gelip o güzel ellerini yalayacağım! 🐈", "mırıl mırıl mırıldanarak sana kocaman şifa gönderiyorum! 🎶", 
        "senin o güzel yüzün hiç asılmasın! 🌼", "patilerimle boynuna kocaman sarılıyorum! 🐾", 
        "bugün de dünyanın en şanslı kedisiyim çünkü sen varsın! 🥰", "kalbimin atışı hep senin için! ❤️"
    ];

    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    const finalMessage = `${pick(arrA)} ${pick(arrB)} ${pick(arrC)}, ${pick(arrD)}`;

    const t = document.getElementById('minikToast');
    t.innerHTML = finalMessage;
    t.style.display = 'block';
}

// SAAT VE CANLI SENKRONİZASYON
function saniyeTiktak() {
    const syncElement = document.getElementById('last-sync');
    const clockElement = document.getElementById('clock');
    const simdi = Date.now();
    const dNow = new Date();
    
    clockElement.textContent = dNow.getDate() + " " + dNow.toLocaleDateString('tr-TR', {month:'short'}) + " • " + String(dNow.getHours()).padStart(2,'0') + ':' + String(dNow.getMinutes()).padStart(2,'0');

    const farkSaniye = sonBasariZamani > 0 ? Math.floor((simdi - sonBasariZamani) / 1000) : 999;
    
    if (sonBasariZamani === 0) {
        syncElement.innerHTML = `🔄 Bağlanıyor...`; syncElement.style.color = "var(--vip-gold)";
    } else if (farkSaniye < 20) {
        const d = new Date(sonBasariZamani);
        const sn = String(d.getSeconds()).padStart(2,'0');
        syncElement.innerHTML = `🟢 Canlı (${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${sn})`;
        syncElement.style.color = "#4ADE80"; 
    } else if (farkSaniye < 60) {
        syncElement.innerHTML = `🟡 Gecikme: ${farkSaniye} sn`; syncElement.style.color = "var(--vip-gold)";
    } else {
        syncElement.innerHTML = `🔴 Bağlantı Yok`; syncElement.style.color = "#FF453A";
    }
}

// PROGRAM HESAPLAYICI (Günlük veya Aylık Sorgular İçin Temel Motor)

    let p = [

      { id: 'sabah-tok', title: 'SABAH TOK', time: '10:00', icon: '🍳', meds: [{ key: 'SABAH_TOK_BALIK', name: 'Balık Yağı', purpose: 'Kalp ve damar sağlığını korur, eklemlere yapısal destek verir.' }, { key: 'SABAH_TOK_GOZ', name: 'Göz Damlası', purpose: 'Sjögren nedeniyle üretilemeyen gözyaşının yerini tutar, korneayı korur.' }] },
      { id: 'ogle', title: 'ÖĞLE', time: '13:00', icon: '☀️', meds: [{ key: 'OGLE_BENEXOL', name: 'Benexol', purpose: 'B12 Vitamini, Sinir kılıflarını besleyerek uyuşma ve karıncalanmaları önler.' }] },
      { id: 'aksam', title: 'AKŞAM', time: '18:00', icon: '🌙', meds: [{ key: 'AKSAM_PLAQUENIL', name: 'Plaquenil', purpose: 'Romatizmanın bağışıklık sistemine verdiği zararı kökten dengeler.' }] },
      { id: 'gece', title: 'GECE', time: '21:00', icon: '🛌', meds: [{ key: 'GECE_QUANTAVIR', name: 'Quantavir', purpose: 'Kullanılan diğer ağır ilaçların karaciğeri yormasını engeller.' }, { key: 'GECE_GOZ', name: 'Göz Damlası', purpose: 'Sjögren nedeniyle üretilemeyen gözyaşının yerini tutar, korneayı korur.' }] }
    ];
    
    const dS = new Date(2026, 1, 16); 
    if(Math.round((mid - dS)/(1000*60*60*24)) % 2 === 0) p[1].meds.push({ key: 'SABAH_TOK_DELTA', name: 'Deltacortril', purpose: 'Vücuttaki akut iltihabı ve şişliği en hızlı baskılayan kortizondur.' });
    if(day === 2) { p[1].meds.push({ key: 'SABAH_TOK_COLEDAN', name: 'Coledan-D3', purpose: 'Kalsiyumun emilmesini sağlar, kemik erimesine karşı kaledir.' }); p[4].meds.push({ key: 'GECE_FOLBIOL', name: 'Folbiol', purpose: 'Romatizma ilaçlarının kan değerlerini düşürmesini engeller, vitamin dengeler.' }); }
    if(day === 1) p[4].meds.push({ key: 'GECE_METOARTCON', name: 'Metoartcon', purpose: 'Eklemlerdeki hasarı durduran haftalık temel tedavi ilacıdır.' });
    const cS = new Date(2026, 1, 12);
    if(Math.round((mid - cS)/(1000*60*60*24)) % 14 === 0) p[4].meds.push({ key: 'GECE_CIMZIA', name: 'Cimzia İğnesi', purpose: 'Doğrudan iltihaba sebep olan proteinleri bulan en gelişmiş biyolojik silahtır.' });
    return p;
}

// O AYKİ TOPLAM İLAÇ SAYISINI MATEMATİKSEL OLARAK HESAPLAMA MOTORU
function getMonthlyTotalMedications(year, month) {
    let total = 0;
    let daysInMonth = new Date(year, month + 1, 0).getDate();
    // Ayın 1'inden son gününe kadar her günü tara
    for (let d = 1; d <= daysInMonth; d++) {
        let currentDay = new Date(year, month, d);
        let prog = getDailyProgram(currentDay);
        // O güne denk gelen tüm ilaç sayısını toplama ekle
        prog.forEach(s => {
            total += s.meds.length;
        });
    }
    return total;
}

// VERİ ÇEKME VE EKRAN ÇİZİMİ
async function veriCek() {
    if (fetchDevamEdiyor) return;
    fetchDevamEdiyor = true;
    
    const todayStr = String(now.getDate()).padStart(2, '0') + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + now.getFullYear();
    try {
        const res = await fetch(`${API_URL}?tarih=${todayStr}`);
        if (!res.ok) throw new Error("Ağ Hatası");
        apiData = await res.json();
        sonBasariZamani = Date.now();
        ekraniCiz();
    } catch(e) { console.error(e); } finally { fetchDevamEdiyor = false; }
}

function ekraniCiz() {
    const todayProg = getDailyProgram(now);
    
    let alertsHTML = "";
    todayProg.forEach(s => {
        s.meds.forEach(m => {
            if(m.key === 'SABAH_TOK_DELTA') alertsHTML += `<div class="safety-shield shield-red" style="display:block;">🚨 Bugün Deltacortril Günü</div>`;
            if(m.key === 'SABAH_TOK_COLEDAN') if(!alertsHTML.includes('Vitamin')) alertsHTML += `<div class="safety-shield shield-yellow" style="display:block;">☀️ Bugün Vitamin ve Folbiol Günü</div>`;
            if(m.key === 'GECE_METOARTCON') alertsHTML += `<div class="safety-shield shield-blue" style="display:block;">🧬 Bugün Metoartcon İğne Günü</div>`;
            if(m.key === 'GECE_CIMZIA') alertsHTML += `<div class="safety-shield shield-purple" style="display:block;">💉 Bugün Cimzia İğne Günü! Şifa olsun.</div>`;
        });
    });
    document.getElementById('alertsArea').innerHTML = alertsHTML;

    // --- YENİ DİNAMİK AYLIK İLAÇ ORANI HESAPLAMA ---
    // 1. Bulunduğumuz ayın toplam kutucuk hedefini (Cimzia, Delta vb. hepsi dahil) dinamik hesapla
    const AYLIK_TOPLAM_ILAC = getMonthlyTotalMedications(now.getFullYear(), now.getMonth()); 
    // 2. Google Sheets'ten dönen "İçilmedi" olarak işaretlenen sayıyı al (Eğer hiç yoksa 0'dır, yani %100'den başlar)
    const kacirilanIlacSayisi = apiData.aylikKacirilan || 0; 
    
    // 3. Yüzdeyi hesapla
    let basariOrani = Math.round(((AYLIK_TOPLAM_ILAC - kacirilanIlacSayisi) / AYLIK_TOPLAM_ILAC) * 100);
    
    // Yüzde sınırları (Negatif olmasını veya 100'ü geçmesini önlem)
    if (basariOrani < 0) basariOrani = 0;
    if (basariOrani > 100) basariOrani = 100;
    
    const rateEl = document.getElementById('monthly-success-rate');
    rateEl.innerText = `%${basariOrani}`;
    
    // Yüzdeye göre renk değiştirme
    if(basariOrani >= 90) rateEl.style.color = "var(--accent)";
    else if(basariOrani >= 70) rateEl.style.color = "var(--warning)";
    else rateEl.style.color = "var(--danger)";


    // TEK SÜTUN DÜZENİ HTML DAĞILIMI
    let timelineHTML = "";

    todayProg.forEach((s) => {
        let sTC = 0; 
        let medsHTML = "";
        
        s.meds.forEach(m => { 
            const isDone = apiData[m.key] === "İçildi";
            if(isDone) { sTC++; }
            
            const iconHTML = isDone ? `<div class="check-icon done">${svgCheck}</div>` : `<div class="check-icon"></div>`;
            
            medsHTML += `
                <div class="history-item">
                    ${iconHTML}
                    <div class="med-info">
                        <span class="drug-title">${m.name}</span>
                        <span class="drug-purpose">${m.purpose}</span>
                    </div>
                </div>`; 
        });
        
        const isAllDone = (sTC === s.meds.length);
        const badgeClass = isAllDone ? "badge-safe" : "badge-wait";
        const badgeText = isAllDone ? `TAMAMLANDI <span class="exp-arrow">▲</span>` : "BEKLİYOR";
        
        const cardClass = isAllDone ? "done-card collapsed" : "";
        const onClick = isAllDone ? `onclick="this.classList.toggle('collapsed')"` : "";

        timelineHTML += `
            <div class="premium-card card ${cardClass}" ${onClick}>
                <div class="card-header">
                    <div class="drug-name">${s.icon} ${s.title}</div>
                    <div class="badge ${badgeClass}">${badgeText}</div>
                </div>
                <div class="meds-container">
                    ${medsHTML}
                </div>
            </div>`;
    });
    
    document.getElementById('timelineArea').innerHTML = timelineHTML;
}

// 10 Saniyede bir güncelle (aktifken)
veriCek();
setInterval(veriCek, 10000); 
setInterval(saniyeTiktak, 1000);

document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'visible') veriCek(); });
